<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - Payment</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Font: Be Vietnam Pro -->
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Be Vietnam Pro', 'sans-serif'],
          },
          colors: {
            brand: '#ff4b2b',
            surface: '#f9f9f9',
            'surface-dim': '#dadada',
          },
          borderRadius: {
            'custom': '30px', // Large rounding for container
            'card': '20px',   // Rounding for white sections
          }
        }
      }
    }
  </script>
<style data-purpose="layout-styles">
    body {
      background-color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .main-container {
      max-width: 430px; /* Mobile-centric width */
      width: 100%;
      height: 100%;
      background-color: #f9f9f9;
      border-radius: 40px;
      padding-bottom: 40px;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    /* Custom radio button styling to match visual exactly */
    input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 1px solid #d1d5db;
      border-radius: 50%;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    input[type="radio"]:checked {
      border-color: #ff4b2b;
    }
    input[type="radio"]:checked::after {
      content: "";
      width: 10px;
      height: 10px;
      background-color: #ff4b2b;
      border-radius: 50%;
      display: block;
    }
  </style>
</head>
<body class="font-sans antialiased text-gray-900">
<!-- BEGIN: MainContainer -->
<main class="main-container flex flex-col overflow-hidden">
<!-- BEGIN: Header -->
<header class="pt-12 px-8 flex items-center justify-between mb-10">
<button class="p-2 -ml-2" data-purpose="back-button">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<h1 class="text-lg font-semibold tracking-tight">Checkout</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- END: Header -->
<div class="px-10 flex-grow">
<!-- BEGIN: Title -->
<section class="mb-12" data-purpose="page-title">
<h2 class="text-4xl font-bold">Payment</h2>
</section>
<!-- END: Title -->
<!-- BEGIN: PaymentMethod -->
<section class="mb-10" data-purpose="payment-section">
<h3 class="text-lg font-semibold mb-5">Payment method</h3>
<div class="bg-white rounded-card p-6 shadow-sm">
<!-- Card Option -->
<label class="flex items-center space-x-4 pb-4 border-b border-gray-100 cursor-pointer">
<input checked="" class="form-radio text-brand" name="payment_method" type="radio"/>
<div class="flex items-center space-x-3 flex-grow">
<div class="w-10 h-10 bg-[#f47a00] rounded-lg flex items-center justify-center" data-purpose="card-icon">
<svg class="h-5 w-5 text-white" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"></path>
<path clip-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" fill-rule="evenodd"></path>
</svg>
</div>
<span class="text-lg">Card</span>
</div>
</label>
<!-- Bank Account Option -->
<label class="flex items-center space-x-4 pt-4 cursor-pointer">
<input class="form-radio text-brand" name="payment_method" type="radio"/>
<div class="flex items-center space-x-3 flex-grow">
<div class="w-10 h-10 bg-[#e64d96] rounded-lg flex items-center justify-center" data-purpose="bank-icon">
<svg class="h-5 w-5 text-white" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10.496 2.132a1 1 0 00-.992 0l-7 4A1 1 0 003 8v7a1 1 0 100 2h14a1 1 0 100-2V8a1 1 0 00.496-1.868l-7-4zM6 9a1 1 0 00-1 1v3a1 1 0 102 0v-3a1 1 0 00-1-1zm3 1a1 1 0 012 0v3a1 1 0 11-2 0v-3zm5-1a1 1 0 00-1 1v3a1 1 0 102 0v-3a1 1 0 00-1-1z" fill-rule="evenodd"></path>
</svg>
</div>
<span class="text-lg">Bank account</span>
</div>
</label>
</div>
</section>
<!-- END: PaymentMethod -->
<!-- BEGIN: DeliveryMethod -->
<section class="mb-12" data-purpose="delivery-section">
<h3 class="text-lg font-semibold mb-5">Delivery method.</h3>
<div class="bg-white rounded-card p-6 shadow-sm">
<!-- Door Delivery Option -->
<label class="flex items-center space-x-4 pb-4 border-b border-gray-100 cursor-pointer">
<input checked="" class="form-radio text-brand" name="delivery_method" type="radio"/>
<span class="text-lg flex-grow">Door delivery</span>
</label>
<!-- Pick Up Option -->
<label class="flex items-center space-x-4 pt-4 cursor-pointer">
<input class="form-radio text-brand" name="delivery_method" type="radio"/>
<span class="text-lg flex-grow">Pick up</span>
</label>
</div>
</section>
<!-- END: DeliveryMethod -->
<!-- BEGIN: FooterSummary -->
<section class="mt-auto" data-purpose="checkout-summary">
<div class="flex justify-between items-center mb-8 px-2">
<span class="text-lg">Total</span>
<span class="text-2xl font-bold">23,000</span>
</div>
<button class="w-full bg-brand text-white py-6 rounded-[30px] text-lg font-semibold shadow-lg active:scale-[0.98] transition-transform" data-purpose="payment-submit-btn">
          Proceed to payment
        </button>
</section>
<!-- END: FooterSummary -->
</div>
</main>
<!-- END: MainContainer -->
</body></html>
