<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Food Delivery - History Empty State</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Custom Fonts (Assuming a clean sans-serif like Inter or SF Pro) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet">
<style data-purpose="custom-styling">
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F2F2F2; /* Slightly off-white background as seen in the mockup */
    }
    .history-icon-container {
      /* Recreating the look of the custom icon if possible, but will use a standard heroicon-style representation */
      width: 120px;
      height: 120px;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<!-- BEGIN: Mobile Container -->
<main class="w-full max-w-[414px] h-[896px] bg-[#F5F5F8] relative flex flex-col overflow-hidden shadow-2xl rounded-[40px]">
<!-- BEGIN: Header -->
<header class="pt-14 px-8 flex items-center" data-purpose="top-navigation">
<button aria-label="Go back" class="text-black">
<!-- Simple Back Arrow -->
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15.75 19.5L8.25 12l7.5-7.5" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<h1 class="flex-1 text-center text-lg font-semibold text-black mr-6">History</h1>
</header>
<!-- END: Header -->
<!-- BEGIN: Empty State Content -->
<div class="flex-1 flex flex-col items-center justify-center px-12 text-center" data-purpose="empty-state-message">
<!-- Icon Placeholder -->
<div class="mb-6 opacity-20 text-gray-900" data-purpose="empty-history-icon">
<svg class="mx-auto" fill="none" height="118" viewBox="0 0 107 118" width="107" xmlns="http://www.w3.org/2000/svg">
<path d="M10 30H97V108H10V30Z" stroke="currentColor" stroke-width="8"></path>
<path d="M26 10V30M81 10V30" stroke="currentColor" stroke-linecap="round" stroke-width="8"></path>
<rect fill="currentColor" height="8" rx="2" width="40" x="38" y="55"></rect>
<rect fill="currentColor" height="8" rx="2" width="22" x="38" y="75"></rect>
</svg>
</div>
<h2 class="text-2xl font-semibold text-black mb-2">No history yet</h2>
<p class="text-gray-500 text-base leading-snug">
        Hit the orange button down below to Create an order
      </p>
</div>
<!-- END: Empty State Content -->
<!-- BEGIN: Bottom Actions -->
<div class="px-8 pb-16" data-purpose="primary-action">
<button class="w-full bg-[#FF4B17] text-white py-5 rounded-[30px] font-semibold text-lg hover:bg-orange-600 transition-colors">
        Start ordering
      </button>
</div>
<!-- END: Bottom Actions -->
<!-- BEGIN: Bottom Tab Navigation -->
<!-- (Note: The mockup shows a blank space at the very bottom for typical iOS home indicator or simple padding) -->
<!-- Adding navigation bar for completeness as seen on the left screen of the reference -->
<nav class="absolute bottom-4 left-0 w-full flex justify-around items-center px-8" data-purpose="bottom-nav">
<!-- Home Icon -->
<a class="p-2 opacity-30" href="#">
<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M11.47 3.84a.75.75 0 011.06 0l8.69 8.69a.75.75 0 101.06-1.06l-8.689-8.69a2.25 2.25 0 00-3.182 0l-8.69 8.69a.75.75 0 001.061 1.06l8.69-8.69z"></path>
<path d="M12 5.432l8.159 8.159c.03.03.06.058.091.086v6.198c0 1.035-.84 1.875-1.875 1.875H15a.75.75 0 01-.75-.75v-4.5a.75.75 0 00-.75-.75h-3a.75.75 0 00-.75.75V21a.75.75 0 01-.75.75H5.625a1.875 1.875 0 01-1.875-1.875v-6.198a2.29 2.29 0 00.091-.086L12 5.43z"></path>
</svg>
</a>
<!-- Heart Icon -->
<a class="p-2 opacity-30" href="#">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</a>
<!-- User Icon -->
<a class="p-2 opacity-30" href="#">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</a>
<!-- History Icon (Active/Selected state implied by being on this screen) -->
<a class="p-2 text-[#FF4B17]" href="#">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</a>
</nav>
<!-- END: Bottom Tab Navigation -->
</main>
<!-- END: Mobile Container -->
</body></html>
