<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Empty Orders Screen</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<style data-purpose="layout-adjustments">
    /* Ensuring the mobile view takes full height and has proper background */
    body {
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .mobile-container {
      width: 100%;
      max-width: 430px; /* Standard mobile width */
      height: 100vh;
      max-height: 932px; /* Standard iPhone height */
      background-color: #f5f5f5;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
<!-- BEGIN: MainContainer -->
<div class="mobile-container flex flex-col p-6" data-purpose="app-screen">
<!-- BEGIN: NavigationHeader -->
<header class="flex items-center justify-between mt-4 mb-10" data-purpose="screen-header">
<!-- Back Arrow Icon -->
<button aria-label="Go back" class="p-2">
<svg fill="none" height="24" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<!-- Screen Title -->
<h1 class="text-xl font-semibold text-gray-900 flex-1 text-center mr-8">Orders</h1>
</header>
<!-- END: NavigationHeader -->
<!-- BEGIN: EmptyStateContent -->
<main class="flex-1 flex flex-col items-center justify-center text-center" data-purpose="empty-state-view">
<!-- Shopping Cart Icon Placeholder -->
<div class="mb-8" data-purpose="empty-cart-illustration">
<!-- Recreating the visual of the large grey shopping cart from the reference -->
<svg fill="none" height="150" viewBox="0 0 24 24" width="150" xmlns="http://www.w3.org/2000/svg">
<path d="M2.25 2.25h1.5l1.06 4.24m0 0l2.36 9.44c.14.56.64.95 1.21.95h8.92c.57 0 1.07-.39 1.21-.95l1.63-6.52a1.25 1.25 0 00-1.21-1.55H6.25m-1.44-5.63l.36 1.44" stroke="#D1D5DB" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<circle cx="10" cy="19.5" fill="#D1D5DB" r="1.5"></circle>
<circle cx="18" cy="19.5" fill="#D1D5DB" r="1.5"></circle>
</svg>
</div>
<!-- Main Heading -->
<h2 class="text-3xl font-bold text-black mb-4">No orders yet</h2>
<!-- Subtitle Description -->
<p class="text-gray-500 text-lg leading-snug max-w-xs mx-auto">
        Hit the orange button down below to Create an order
      </p>
</main>
<!-- END: EmptyStateContent -->
<!-- BEGIN: ActionButtonArea -->
<footer class="mt-auto mb-10" data-purpose="primary-action">
<button class="w-full bg-[#FF4B0F] text-white font-semibold py-5 rounded-3xl text-lg transition-transform active:scale-95 shadow-lg shadow-orange-200">
        Start ordering
      </button>
</footer>
<!-- END: ActionButtonArea -->
</div>
<!-- END: MainContainer -->
</body></html>
