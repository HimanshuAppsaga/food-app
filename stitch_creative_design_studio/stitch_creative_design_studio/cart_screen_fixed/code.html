<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    body { font-family: 'Be Vietnam Pro', sans-serif; }
    .card-shadow { box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.03); }
    .swiped-item { transform: translateX(-100px); }
  </style>
</head>
<body class="bg-surface min-h-screen flex flex-col text-on-surface">
<!-- BEGIN: Navigation Header -->
<header class="relative px-gutter pt-12 pb-6 flex items-center justify-center" data-purpose="main-header">
<button aria-label="Go back" class="absolute left-gutter p-2 text-on-surface">
<svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 18L9 12L15 6" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<h1 class="text-label-lg font-bold">Cart</h1>
</header>
<!-- END: Navigation Header -->
<!-- BEGIN: Main Content Section -->
<main class="flex-grow px-gutter" data-purpose="cart-items-container">
<!-- Instruction Hint -->
<div class="flex items-center justify-center space-x-2 mb-8" data-purpose="swipe-instruction">
<span class="material-symbols-outlined text-lg opacity-60">pan_tool_alt</span>
<p class="text-label-sm opacity-80">swipe on an item to delete</p>
</div>
<div class="space-y-4">
<!-- Cart Item 1 -->
<div class="relative flex items-center" data-purpose="cart-item">
<div class="w-full bg-surface-container-lowest rounded-[20px] p-4 flex items-center card-shadow z-10">
<div class="flex-shrink-0 mr-4">
<img alt="Veggie tomato mix" class="w-20 h-20 rounded-full object-cover shadow-sm" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVxzsBP8ra00jdjGPi0Pr9OmQPSpZyGV95DOn0-qWggD67SR5_Q9qH9TC9jZq2lkuth3NxsuqL0vKNWmwJFU9HOTQcmBhxUDG-9xR85os_K_DmNF7watkGNHvTiNxKZafQVeWNvJoAMlSiSA2M74MbsTIgJJKhJuwO5HYziR50GkAuLd4AQZtRjiTHKYyCCZDI29qMKWPFfuR6pOPtMZ2mMFdjn6OMJzj-PyTey3lBxrHx-lVZMSaokNfV3unKP4pqLN6eWPjH1FQQ"/>
</div>
<div class="flex-grow">
<h3 class="font-bold text-body-lg text-on-surface">Veggie tomato mix</h3>
<span class="text-primary font-bold text-body-lg">#1,900</span>
</div>
<div class="bg-primary flex items-center px-3 py-1 rounded-full space-x-3 text-on-primary text-[10px] font-bold">
<button>-</button>
<span>1</span>
<button>+</button>
</div>
</div>
</div>
<!-- Cart Item 2 -->
<div class="relative flex items-center" data-purpose="cart-item">
<div class="w-full bg-surface-container-lowest rounded-[20px] p-4 flex items-center card-shadow z-10">
<div class="flex-shrink-0 mr-4">
<img alt="Fish with mix orange" class="w-20 h-20 rounded-full object-cover shadow-sm" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDkHQCG2NF4J0vOb-d_9EQ-6Za4GuVz8_Pf1Vz99oANllxSCqiOM5sWnuzrS2ikzGTV4YeywecvB4f1CDC23jB7bHUUkgv0zV4Pw8t3iKvA2MBzcFpPp17mmvM-TUABcyPZRNTgPLqMBsa5cefwJpHYbbs-XE-m8QqjhZHv-E95kVeKiQ_m9QJVYPk8CauzVFfneryl5uWqFpsEWmwMJj2WSlwG9OAvKi1B5kdAck2QnLF9pdXw_8KhcaJrhcgTCiKpZ-YbQcVkiOUM"/>
</div>
<div class="flex-grow">
<h3 class="font-bold text-body-lg text-on-surface">Fishwith mix orange....</h3>
<span class="text-primary font-bold text-body-lg">#1,900</span>
</div>
<div class="bg-primary flex items-center px-3 py-1 rounded-full space-x-3 text-on-primary text-[10px] font-bold">
<button>-</button>
<span>1</span>
<button>+</button>
</div>
</div>
</div>
<!-- Swiped Cart Item State -->
<div class="relative flex items-center" data-purpose="cart-item-swiped">
<div class="w-[85%] bg-surface-container-lowest rounded-[20px] p-4 flex items-center card-shadow z-10 -translate-x-12 transition-transform duration-300">
<div class="flex-shrink-0 mr-4">
<img alt="Veggie tomato mix" class="w-16 h-16 rounded-full object-cover shadow-sm" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3Icz2cpGoXtgKkmJQ1WrGtgWwNnPTvWJT2c_ABujp7NrvhWiP9Zu2qq9rlZtNLY2Uo3d0sxfJbpAfB2gIgMgrc_Mi2dQQ7-G740ecLBkyc1v5iHcp5aV7UWoVGdKeSG6kb09hH6EGJmkvGFLvmhwl8oxNJ9GHEoezwbIyzxD4HPTcZEeWPNQ22AKMZ4ad26J8B9GmvUkjKfqWtcwuQgE1ZnUUv-NdrfUoWNbV---4s6lCp04Hbo8D7MHEKw_4nnj4FcL6omSs58fz"/>
</div>
<div class="flex-grow overflow-hidden">
<h3 class="font-bold text-body-sm text-on-surface truncate">Veggie tomato mix</h3>
<div class="flex items-center space-x-2">
<span class="text-primary font-bold text-body-sm">#1,900</span>
<div class="bg-primary flex items-center px-2 py-0.5 rounded-full space-x-2 text-on-primary text-[9px] font-bold">
<span>-</span>
<span>1</span>
<span>+</span>
</div>
</div>
</div>
</div>
<!-- Actions revealed behind -->
<div class="absolute right-0 flex space-x-2 z-0" data-purpose="swipe-actions">
<button class="w-11 h-11 bg-primary rounded-full flex items-center justify-center text-on-primary shadow-lg">
<span class="material-symbols-outlined text-[20px]">favorite</span>
</button>
<button class="w-11 h-11 bg-primary rounded-full flex items-center justify-center text-on-primary shadow-lg">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
</div>
</main>
<!-- END: Main Content Section -->
<!-- BEGIN: Bottom Action Area -->
<footer class="p-8 pb-12" data-purpose="footer-actions">
<button class="w-full bg-primary text-on-primary py-6 rounded-[24px] font-bold text-label-lg shadow-xl active:scale-[0.98] transition-transform">
    Complete order
  </button>
</footer>
<!-- END: Bottom Action Area -->
</body></html>
