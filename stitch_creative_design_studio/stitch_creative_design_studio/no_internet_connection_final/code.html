<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>No Internet Connection</title>
<!-- Tailwind CSS v3 CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-layout">
    /* Ensuring the body takes the full height of the mobile screen */
    body, html {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
  </style>
<style data-purpose="typography">
    /* Custom font styling to match the clean aesthetic */
    .font-primary {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body class="bg-[#F4F4F6] font-primary flex items-center justify-center p-6">
<!-- BEGIN: ErrorStateContainer -->
<main class="w-full max-w-md flex flex-col items-center text-center space-y-8" data-purpose="no-internet-state">
<!-- BEGIN: ConnectionIcon -->
<!-- Large grey 'no wifi' icon centered in the upper middle area -->
<div class="mb-4" data-purpose="status-icon">
<svg class="text-gray-300" fill="none" height="160" viewBox="0 0 24 24" width="160" xmlns="http://www.w3.org/2000/svg">
<path d="M1 1L23 23M16.72 11.06C17.9 11.53 19.03 12.16 20.06 12.93L21.48 11.51C18.66 9.38 15.3 8.08 11.75 8.01C11.16 8 10.58 8.02 10 8.08M7.07 11.06C6.55 11.27 6.05 11.53 5.57 11.84L6.99 13.26C7.29 13.07 7.6 12.9 7.92 12.75M10.94 14.94C11.28 14.91 11.63 14.9 11.98 14.9C12.33 14.9 12.67 14.91 13.01 14.94M13.78 17.78C13.28 18.37 12.67 18.81 11.98 19.08M8.41 12.41L2.52 6.52C1.65 7.15 0.82 7.84 0.05 8.61L1.47 10.03C2.26 9.24 3.12 8.52 4.04 7.89M11.98 19.08C11.5 18.89 11.07 18.6 10.7 18.23L12.12 19.65C12.07 19.46 12.03 19.27 11.98 19.08Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<!-- END: ConnectionIcon -->
<!-- BEGIN: TextContent -->
<div class="space-y-4 px-4" data-purpose="content-text">
<!-- Main Heading -->
<h1 class="text-3xl font-bold text-black tracking-tight">
        No internet Connection
      </h1>
<!-- Explanatory Subtitle -->
<p class="text-gray-500 text-lg leading-relaxed">
        Your internet connection is currently<br>not available please check or try again.
      </p>
</div>
<!-- END: TextContent -->
<!-- BEGIN: ActionButton -->
<div class="w-full pt-6" data-purpose="action-container">
<button class="w-full py-5 bg-[#FF4B0F] hover:bg-[#E6430D] active:scale-[0.98] transition-all text-white text-xl font-semibold rounded-[32px] shadow-lg shadow-orange-200" id="try-again-button" type="button">
        Try again
      </button>
</div>
<!-- END: ActionButton -->
</main>
<!-- END: ErrorStateContainer -->
<script data-purpose="button-interaction">
    // Simple script to handle the click event for the 'Try again' button
    document.getElementById('try-again-button').addEventListener('click', function() {
      // Logic for checking connection or refreshing could go here
      console.log('Attempting to reconnect...');
      window.location.reload();
    });
  </script>
</body></html>
