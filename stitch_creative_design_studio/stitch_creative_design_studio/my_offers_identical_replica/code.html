<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Offers - Vibrant Culinaria</title>
<!-- Tailwind CSS v3 CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Be Vietnam Pro -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#ff4b2b',
            surface: '#f9f9f9',
            'surface-dim': '#dadada',
            'surface-bright': '#f9f9f9',
            'text-primary': '#000000',
            'text-secondary': '#6B7280',
          },
          fontFamily: {
            sans: ['"Be Vietnam Pro"', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          }
        }
      }
    }
  </script>
<style data-purpose="global-layout">
    body {
      background-color: #f9f9f9;
      font-family: 'Be Vietnam Pro', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Mobile screen containment for simulation */
    .mobile-container {
      max-width: 430px; /* iPhone 14/15 Pro Max approx width */
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }
  </style>
</head>
<body class="bg-surface text-text-primary">
<div class="mobile-container p-6">
<!-- BEGIN: MainHeader -->
<header class="pt-8 pb-12" data-purpose="navigation-header">
<!-- Back Arrow Icon -->
<button aria-label="Go back" class="mb-10 flex items-center justify-start focus:outline-none">
<svg class="text-black" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="m15 18-6-6 6-6"></path>
</svg>
</button>
<!-- Screen Title -->
<h1 class="text-4xl font-bold tracking-tight" data-purpose="page-title">
        My offers
      </h1>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: EmptyStateSection -->
<main class="flex-grow flex flex-col items-center justify-center text-center px-4" data-purpose="empty-state-container">
<div class="space-y-4 max-w-xs">
<!-- Empty State Heading -->
<h2 class="text-3xl font-bold tracking-tight text-black" data-purpose="empty-state-heading">
          ohh snap! No offers yet
        </h2>
<!-- Empty State Description -->
<p class="text-[17px] text-gray-500 font-normal leading-relaxed" data-purpose="empty-state-description">
          Bella dose't have any offers yet please check again.
        </p>
</div>
</main>
<!-- END: EmptyStateSection -->
<!-- Spacer for bottom of screen -->
<footer aria-hidden="true" class="h-20"></footer>
</div>
</body></html>
