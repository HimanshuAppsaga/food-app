<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Food Delivery App - Home</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Custom Tailwind Config -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ff4b2b',
            secondary: '#9a9a9d',
            bgMain: '#f2f2f2',
            bgCard: '#ffffff',
          },
          fontFamily: {
            sans: ['SF Pro Display', 'Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
<!-- Custom Styles -->
<style data-purpose="custom-styling">
    body {
      background-color: #f2f2f2;
      -webkit-tap-highlight-color: transparent;
    }
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    .card-shadow {
      box-shadow: 0px 30px 60px rgba(57, 57, 57, 0.1);
    }
  </style>
</head>
<body class="flex flex-col min-h-screen text-[#000000]">
<!-- BEGIN: MainHeader -->
<header class="px-8 pt-10 flex justify-between items-center" data-purpose="header">
<button aria-label="Menu" class="p-2">
<!-- Simple Menu Icon -->
<svg fill="none" height="18" viewBox="0 0 24 18" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M0 0H24V2H0V0ZM0 8H18V10H0V8ZM0 16H24V18H0V16Z" fill="black"></path>
</svg>
</button>
<button aria-label="Cart" class="p-2">
<!-- Shopping Cart Icon -->
<svg fill="none" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 20C9 21.1 8.1 22 7 22C5.9 22 5 21.1 5 20C5 18.9 5.9 18 7 18C8.1 18 9 18.9 9 20ZM17 18C15.9 18 15 18.9 15 20C15 21.1 15.9 22 17 22C18.1 22 19 21.1 19 20C19 18.9 18.1 18 17 18ZM7.17 14.75L7.2 14.63L8.1 13H15.55C16.3 13 16.96 12.59 17.3 11.97L21.16 4.96L19.42 4H19.41L18.31 6L15.55 11H8.53L8.4 10.73L6.16 6L5.21 4L4.27 2H1V4H3L6.6 11.59L5.25 14.04C5.09 14.32 5 14.65 5 15C5 16.1 5.9 17 7 17H19V15H7.42C7.29 15 7.17 14.89 7.17 14.75Z" fill="#9A9A9D"></path>
</svg>
</button>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: ContentArea -->
<main class="flex-grow pt-8" data-purpose="main-content">
<!-- Hero Title -->
<section class="px-12 mb-8">
<h1 class="text-[34px] leading-[40px] font-bold max-w-[220px]">
        Delicious food for you
      </h1>
</section>
<!-- Search Bar -->
<section class="px-10 mb-10">
<div class="relative flex items-center">
<div class="absolute inset-y-0 left-0 pl-8 flex items-center pointer-events-none">
<svg class="h-6 w-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"></path>
</svg>
</div>
<input class="block w-full pl-16 pr-4 py-4 bg-[#EFEEEE] border-none rounded-full text-lg font-semibold focus:ring-2 focus:ring-primary placeholder-[#676767]" placeholder="Search" type="text">
</div>
</section>
<!-- Category Tabs -->
<nav class="pl-12 overflow-x-auto no-scrollbar mb-10" data-purpose="category-tabs">
<ul class="flex space-x-10 text-[17px] font-normal whitespace-nowrap">
<li class="relative pb-2">
<a class="text-primary font-semibold" href="#">Foods</a>
<div class="absolute bottom-0 left-0 right-0 h-[3px] bg-primary rounded-full"></div>
</li>
<li class="pb-2">
<a class="text-secondary hover:text-primary" href="#">Drinks</a>
</li>
<li class="pb-2">
<a class="text-secondary hover:text-primary" href="#">Snacks</a>
</li>
<li class="pb-2">
<a class="text-secondary hover:text-primary" href="#">Sauces</a>
</li>
</ul>
</nav>
<!-- Food Scroll Section -->
<section data-purpose="food-display">
<div class="flex justify-end px-12 mb-10">
<a class="text-primary text-[15px] font-normal" href="#">see more</a>
</div>
<!-- Horizontal Scroll of Cards -->
<div class="flex overflow-x-auto pl-12 space-x-8 pb-12 no-scrollbar" data-purpose="food-cards-container">
<!-- Card 1 -->
<div class="relative flex-shrink-0 w-[220px] pt-14">
<!-- Food Image (Floating) -->
<div class="absolute top-0 left-1/2 transform -translate-x-1/2 z-10">
<img alt="Veggie tomato mix" class="w-40 h-40 rounded-full object-cover shadow-xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDly_AaAuGultgzu5KylMQfsnBcHNGylVjFrPXTpUMtXALjsDtQQnPkuPvUpRN4_dQrtiMwCJ0tPgO2VCkS_nXJWwK6KL-T2rZPJ7gvBnh2hphXl5h7pU_lsKSnWyJLSff2lGW7laCt5PB3_y3TgtbsxUcKGOcjcxczt737Wv5_GndWp2i1v76jdr3ljJhTSvfMH-UJFWwVyT9EImEHO1nHXJ9lk0SOf7uvHHt7dHnRxSH7z_pA02o-pkPtp_p2zmzrXA05H-WF4Rg4" style="clip-path: circle(50%);">
</div>
<!-- White Card Background -->
<div class="bg-white rounded-[30px] pt-32 pb-8 px-6 text-center card-shadow h-full">
<h3 class="text-[22px] font-bold leading-tight mb-4">Veggie tomato mix</h3>
<p class="text-primary text-[17px] font-bold">N1,900</p>
</div>
</div>
<!-- Card 2 (Partially visible) -->
<div class="relative flex-shrink-0 w-[220px] pt-14 opacity-90">
<!-- Food Image (Floating) -->
<div class="absolute top-0 left-1/2 transform -translate-x-1/2 z-10">
<img alt="Spicy fish sauce" class="w-40 h-40 rounded-full object-cover shadow-xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwCbaKAYKJqBDWb7DAZhnskc1Yx_74GgDUBgoTcip1n2S27qRndGPFZO1MqrkAKtBNuJ2TS7jCdPwDnJvaUUyZLuiWN6wZqR0yCsE61VKmdkIlwmpXscW5vLTfbfu4I8seK592F9P9WZNmnr7U9XVBRImOGjLX5dNMfue0T4xMwoR7lo6hvcB-BMmGszrZYIxooF8pqgB-IXPSkCqEhgk_YRBrKAsLx__LbdT-U9pQCgSyqTnkkwNqzRdfmmBgueYXNoGGVscdLSMx">
</div>
<!-- White Card Background -->
<div class="bg-white rounded-[30px] pt-32 pb-8 px-6 text-center card-shadow h-full">
<h3 class="text-[22px] font-bold leading-tight mb-4">Spicy fish sauce</h3>
<p class="text-primary text-[17px] font-bold">N2,300</p>
</div>
</div>
</div>
</section>
</main>
<!-- END: ContentArea -->
<!-- BEGIN: BottomNavigation -->

<!-- Home Icon (Active) -->

<svg fill="none" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M10 20V14H14V20H19V12H22L12 3L2 12H5V20H10Z" fill="#ff4b2b"></path>
</svg>
</button>
<!-- Favorites Icon -->

</svg>

<path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="#ADADAF"></path>

<path d="M13 3C8.03 3 4 7.03 4 12H1L4.89 15.89L4.96 16.03L9 12H6C6 8.13 9.13 5 13 5C16.87 5 20 8.13 20 12C20 15.87 16.87 19 13 19C11.07 19 9.32 18.21 8.06 16.94L6.64 18.36C8.27 19.99 10.51 21 13 21C17.97 21 22 16.97 22 12C22 7.03 17.97 3 13 3ZM12 8V13L16.28 15.54L17 14.33L13.5 12.25V8H12Z" fill="#ADADAF"></path>
</svg>

</nav>
</footer>
<!-- END: BottomNavigation -->
</body></html>
